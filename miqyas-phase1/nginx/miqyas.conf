# ═══════════════════════════════════════════════════════════════
# Nginx — قالب عكسي لمنصة مِقياس
# انسخ إلى: /etc/nginx/sites-available/miqyas
# ثم: sudo ln -s /etc/nginx/sites-available/miqyas /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name SUBDOMAIN.example.org;

    # رفع الشواهد حتى 10MB + هامش
    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── HTTPS عبر Let's Encrypt (certbot) ──
# بعد ضبط DNS (سجل A → IP السيرفر):
#
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d SUBDOMAIN.example.org
#
# certbot يُحدّث هذا الملف تلقائياً بكتلة listen 443 ssl.
# للتجديد التلقائي: certbot يضيف cron/systemd timer افتراضياً.
